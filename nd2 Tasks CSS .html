<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>Task Responsive Form</title>

</head>
<body>

        <form class="contact-form">

            <button type="submit" class="submit-btn">إرسال</button>
        </form>
    </div>

</body>
</html>
